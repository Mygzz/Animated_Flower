<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enchanted Night Garden | I Love You</title>
    <style>
        /* RESET & FULLSCREEN OVERRIDE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', 'Arial', 'Dancing Script', cursive, system-ui;
        }

        /* MAIN SCENE WRAPPER — FULL BLEED, PERFECT CENTERING */
        .fullscreen-garden {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a1f1a 0%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
        }

        /* ORIGINAL FLOWER SCENE ADAPTED TO FULLSCREEN */
        .flower-scene {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow: hidden;
            perspective: 1200px;
            padding: 0;
            border-radius: 0;
            position: relative;
            transform: scale(1);
            transform-origin: center bottom;
        }

        /* night ambience */
        .night {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            filter: blur(0.1vmin);
            background: radial-gradient(ellipse at 50% 20%, rgba(20, 40, 50, 0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .flowers {
            position: relative;
            transform: scale(0.9);
            transform-origin: bottom center;
            transition: transform 0.2s ease;
            margin-bottom: -2vh;
        }

        @media (max-width: 768px) {
            .flowers { transform: scale(0.75); }
        }
        @media (max-width: 480px) {
            .flowers { transform: scale(0.6); }
        }

        /* floating particles for extra romance */
        .fullscreen-garden::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20% 30%, rgba(255,200,220,0.3), transparent),
                              radial-gradient(1px 1px at 70% 85%, rgba(255,100,150,0.2), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            pointer-events: none;
            z-index: 2;
            animation: driftParticles 60s linear infinite;
        }

        @keyframes driftParticles {
            0% { background-position: 0 0; }
            100% { background-position: 400px 400px; }
        }

        /* ========= I LOVE YOU POPUP ANIMATION ========= */
        .love-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
            overflow: visible;
        }

        .love-bubble {
            position: absolute;
            font-family: 'Dancing Script', 'Brush Script MT', cursive, 'Segoe UI';
            font-weight: bold;
            font-size: clamp(2rem, 8vw, 6rem);
            color: #ffb7c5;
            text-shadow: 0 0 20px #ff3366, 0 0 40px #ff66aa, 2px 2px 10px rgba(0,0,0,0.5);
            white-space: nowrap;
            opacity: 0;
            transform: scale(0.2) translateY(30px);
            animation: lovePopFloaty 4s ease-out forwards;
            filter: drop-shadow(0 0 8px rgba(255,80,120,0.8));
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff0f5, #ffc0d0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
            -webkit-text-stroke: 1px rgba(255,80,120,0.3);
        }

        /* different heart variants & sparkle */
        .love-bubble::before {
            content: "❤️";
            font-size: 0.8em;
            display: inline-block;
            margin-right: 8px;
            background: none;
            color: #ff4d6d;
            text-shadow: 0 0 8px #ff99bb;
            vertical-align: middle;
        }

        .love-bubble::after {
            content: "❤️";
            font-size: 0.8em;
            display: inline-block;
            margin-left: 8px;
            background: none;
            color: #ff4d6d;
            text-shadow: 0 0 8px #ff99bb;
            vertical-align: middle;
        }

        /* different positions and delays for multiple "I love you" appearances */
        .love-bubble:nth-child(1) { top: 15%; left: 10%; animation-delay: 0.8s; font-size: clamp(2rem, 7vw, 4.5rem); }
        .love-bubble:nth-child(2) { top: 30%; right: 5%; animation-delay: 2s; font-size: clamp(2rem, 8vw, 5rem); transform-origin: center; }
        .love-bubble:nth-child(3) { bottom: 20%; left: 15%; animation-delay: 3.5s; font-size: clamp(2rem, 6vw, 4rem); }
        .love-bubble:nth-child(4) { top: 60%; right: 15%; animation-delay: 5s; font-size: clamp(2rem, 7vw, 4.8rem); }
        .love-bubble:nth-child(5) { top: 45%; left: 25%; animation-delay: 6.5s; font-size: clamp(2.5rem, 9vw, 5.5rem); }
        .love-bubble:nth-child(6) { bottom: 10%; right: 20%; animation-delay: 8s; font-size: clamp(1.8rem, 5vw, 3.8rem); }
        .love-bubble:nth-child(7) { top: 75%; left: 40%; animation-delay: 9.5s; font-size: clamp(2rem, 6vw, 4.2rem); }
        .love-bubble:nth-child(8) { top: 20%; left: 60%; animation-delay: 11s; font-size: clamp(2rem, 7vw, 5rem); }
        .love-bubble:nth-child(9) { bottom: 45%; right: 35%; animation-delay: 12.8s; font-size: clamp(2rem, 6.5vw, 4.4rem); }
        .love-bubble:nth-child(10) { top: 85%; left: 70%; animation-delay: 14s; font-size: clamp(1.8rem, 5vw, 3.5rem); }

        /* keyframes: pop + float + fade */
        @keyframes lovePopFloaty {
            0% {
                opacity: 0;
                transform: scale(0.2) translateY(40px) rotate(-5deg);
                filter: blur(8px);
            }
            20% {
                opacity: 1;
                transform: scale(1.1) translateY(-10px) rotate(2deg);
                filter: blur(0px);
            }
            40% {
                opacity: 1;
                transform: scale(1) translateY(-25px) rotate(-1deg);
            }
            70% {
                opacity: 0.9;
                transform: scale(0.98) translateY(-50px) rotate(3deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.6) translateY(-120px) rotate(8deg);
                filter: blur(4px);
            }
        }

        /* additional gentle floating hearts in background (tiny) */
        .floating-hearts {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        .tiny-heart {
            position: absolute;
            font-size: 18px;
            opacity: 0;
            animation: floatHeart 8s linear infinite;
            color: #ff6b8b;
            filter: drop-shadow(0 0 4px #ff99bb);
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) scale(0.3);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) scale(1.2);
                opacity: 0;
            }
        }

        /* preserve all original styles below */
        :root { --dark-color: #000; }
        .flower-scene { min-height: auto; background-color: transparent; border-radius: 0; padding: 0; }
        .night { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 100%; height: 100%; filter: blur(0.1vmin); background: transparent; }
        .flowers { position: relative; transform: scale(0.9); }
        .flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; --fl-speed: 0.8s; }
        .flower--1 { animation: moving-flower-1 4s linear infinite; }
        .flower--2 { left: 50%; transform: rotate(20deg); animation: moving-flower-2 4s linear infinite; }
        .flower--3 { left: 50%; transform: rotate(-15deg); animation: moving-flower-3 4s linear infinite; }
        .flower--1 .flower__line { height: 70vmin; animation-delay: .3s; }
        .flower--2 .flower__line { height: 60vmin; animation-delay: .6s; }
        .flower--3 .flower__line { animation-delay: .9s; }
        .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
        .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
        .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.2s backwards; }
        .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1s backwards; }
        .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
        .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left var(--fl-speed) 2s backwards; }
        .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
        .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
        .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.5s backwards; }
        .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.3s backwards; }
        .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
        .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
        .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.1s backwards; }
        .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.9s backwards; }
        .flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
        .flower__leafs--1 { animation-delay: 1.1s; }
        .flower__leafs--2 { animation-delay: 1.4s; }

        .flower__leafs::after { content: ""; position: absolute; left: 0; top: 0; transform: translate(-50%,-100%); width: 8vmin; height: 8vmin; background-color: #6bf0ff; filter: blur(10vmin); }
        .flower__leaf { position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin; border-radius: 51% 49% 47% 53%/44% 45% 55% 69%; background-color: #a7ffee; background-image: linear-gradient(to top,#54b8aa,#a7ffee); transform-origin: bottom center; opacity: .9; box-shadow: inset 0 0 2vmin rgba(255,255,255,.5); }
        .flower__leaf--1 { transform: translate(-10%,1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%,-4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%,0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 { width: 8vmin; height: 8vmin; transform-origin: bottom left; border-radius: 4vmin 10vmin 4vmin 4vmin; transform: translate(-0%,18%) rotateX(70deg) rotate(-43deg); background-image: linear-gradient(to top,#39c6d6,#a7ffee); z-index: 1; opacity: .8; }
        .flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background-color: #fff; }
        .flower__white-circle::after { content: ""; position: absolute; left: 50%; top: 45%; transform: translate(-50%,-50%); width: 60%; height: 60%; border-radius: inherit; background-image: linear-gradient(90deg,rgb(255,235,18),rgb(255,206,0)); }
        .flower__line { height: 55vmin; width: 1.5vmin; background-image: linear-gradient(to left,rgb(0,0,0,.2),transparent,rgba(255,255,255,.2)),linear-gradient(to top,transparent 10%,#14757a,#39c6d6); box-shadow: inset 0 0 2px rgba(0,0,0,.5); animation: grow-flower-tree 4s backwards; }
        .flower__line__leaf { --w:7vmin; --h:calc(var(--w) + 2vmin); position: absolute; top: 20%; left: 90%; width: var(--w); height: var(--h); border-top-right-radius: var(--h); border-bottom-left-radius: var(--h); background-image: linear-gradient(to top,rgba(20,117,122,.4),#39c6d6); }
        .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--3,.flower__line__leaf--4,.flower__line__leaf--6 { border-top-right-radius: 0; border-bottom-left-radius: 0; border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); left: -460%; top: 12%; transform: rotate(-70deg) rotateY(30deg); }
        .flower__line__leaf--4 { top: 40%; }
        .flower__line__leaf--5 { top: 0; transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(.6); }
        .flower__line__leaf--6 { top: -2%; left: -450%; transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(.6); }
        .flower__light { position: absolute; bottom: 0; width: 1vmin; height: 1vmin; background-color: rgb(255,251,0); border-radius: 50%; filter: blur(.2vmin); animation: light-ans 4s linear infinite backwards; }
        .flower__light:nth-child(odd) { background-color: #23f0ff; }
        .flower__light--1 { left: -2vmin; animation-delay: 1s; }
        .flower__light--2 { left: 3vmin; animation-delay: .5s; }
        .flower__light--3 { left: -6vmin; animation-delay: .3s; }
        .flower__light--4 { left: 6vmin; animation-delay: .9s; }
        .flower__light--5 { left: -1vmin; animation-delay: 1.5s; }
        .flower__light--6 { left: -4vmin; animation-delay: 3s; }
        .flower__light--7 { left: 3vmin; animation-delay: 2s; }
        .flower__light--8 { left: -6vmin; animation-delay: 3.5s; }
        .flower__grass { --c:#159faa; --line-w:1.5vmin; position: absolute; bottom: 12vmin; left: -7vmin; display: flex; flex-direction: column; align-items: flex-end; z-index: 20; transform-origin: bottom center; transform: rotate(-48deg) rotateY(40deg); }
        .flower__grass--1 { animation: moving-grass 2s linear infinite; }
        .flower__grass--2 { left: 2vmin; bottom: 10vmin; transform: scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); opacity: .8; z-index: 0; animation: moving-grass--2 1.5s linear infinite; }
        .flower__grass--top { width: 7vmin; height: 10vmin; border-top-right-radius: 100%; border-right: var(--line-w) solid var(--c); transform-origin: bottom center; transform: rotate(-2deg); }
        .flower__grass--bottom { margin-top: -2px; width: var(--line-w); height: 25vmin; background-image: linear-gradient(to top,transparent,var(--c)); }
        .flower__grass__leaf { --size:10vmin; position: absolute; width: calc(var(--size)*2.1); height: var(--size); border-top-left-radius: var(--size); border-top-right-radius: var(--size); background-image: linear-gradient(to top,transparent,transparent 30%,var(--c)); z-index: 100; }
        .flower__grass__leaf--1 { top:-6%; left:30%; --size:6vmin; transform:rotate(-20deg); animation:growing-grass-ans--1 2s 2.6s backwards; }
        .flower__grass__leaf--2 { top:-5%; left:-110%; --size:6vmin; transform:rotate(10deg); animation:growing-grass-ans--2 2s 2.4s linear backwards; }
        .flower__grass__leaf--3 { top:5%; left:60%; --size:8vmin; transform:rotate(-18deg) rotateX(-20deg); animation:growing-grass-ans--3 2s 2.2s linear backwards; }
        .flower__grass__leaf--4 { top:6%; left:-135%; --size:8vmin; transform:rotate(2deg); animation:growing-grass-ans--4 2s 2s linear backwards; }
        .flower__grass__leaf--5 { top:20%; left:60%; --size:10vmin; transform:rotate(-24deg) rotateX(-20deg); animation:growing-grass-ans--5 2s 1.8s linear backwards; }
        .flower__grass__leaf--6 { top:22%; left:-180%; --size:10vmin; transform:rotate(10deg); animation:growing-grass-ans--6 2s 1.6s linear backwards; }
        .flower__grass__leaf--7 { top:39%; left:70%; --size:10vmin; transform:rotate(-10deg); animation:growing-grass-ans--7 2s 1.4s linear backwards; }
        .flower__grass__leaf--8 { top:40%; left:-215%; --size:11vmin; transform:rotate(10deg); animation:growing-grass-ans--8 2s 1.2s linear backwards; }
        .flower__grass__overlay { position: absolute; top:-10%; right:0; width:100%; height:100%; background-color:rgba(0,0,0,.6); filter:blur(1.5vmin); z-index:100; }
        .flower__g-long { --w:2vmin; --h:6vmin; --c:#159faa; position:absolute; bottom:10vmin; left:-3vmin; transform-origin:bottom center; transform:rotate(-30deg) rotateY(-20deg); display:flex; flex-direction:column; align-items:flex-end; animation:flower-g-long-ans 3s linear infinite; }
        .flower__g-long__top { width:calc(var(--w)+1vmin); height:var(--h); border-top-right-radius:100%; border-right:.7vmin solid var(--c); transform:translate(-.7vmin,1vmin); }
        .flower__g-long__bottom { width:var(--w); height:50vmin; transform-origin:bottom center; background-image:linear-gradient(to top,transparent 30%,var(--c)); box-shadow:inset 0 0 2px rgba(0,0,0,.5); clip-path:polygon(35% 0,65% 1%,100% 100%,0% 100%); }
        .flower__g-right { position:absolute; bottom:6vmin; left:-2vmin; transform-origin:bottom left; transform:rotate(20deg); }
        .flower__g-right .leaf { width:30vmin; height:50vmin; border-top-left-radius:100%; border-left:2vmin solid #079097; background-image:linear-gradient(to bottom,transparent,var(--dark-color) 60%); -webkit-mask-image:linear-gradient(to top,transparent 30%,#079097 60%); }

        .flower__g-fr__leaf--7 { left:5vmin; top:22vmin; transform:rotate(45deg); animation:flower__g-fr-leaft-ans-7 .5s 4s linear backwards; }
        .flower__g-fr__leaf--8 { left:-4vmin; top:15vmin; transform:rotate(15deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-8 .5s 3.8s linear backwards; }
        .long-g { position:absolute; bottom:25vmin; left:-42vmin; transform-origin:bottom left; }
        .long-g--1 { bottom:0; transform:scale(.8) rotate(-5deg); }
        .long-g--1 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 40%,#079097 80%)!important; }
        .long-g--2,.long-g--3 { bottom:-3vmin; left:-35vmin; transform-origin:center; transform:scale(.6) rotateX(60deg); }
        .long-g--2 .leaf,.long-g--3 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 50%,#079097 80%)!important; }

<script>
    // create additional tiny floating hearts continuously for extra romantic vibe
    function createTinyHeart() {
        const heartContainer = document.getElementById('tinyHearts');
        if (!heartContainer) return;
        const heart = document.createElement('div');
        heart.classList.add('tiny-heart');
        heart.innerHTML = '❤️';
        const size = Math.random() * 18 + 12; // 12px to 30px
        heart.style.fontSize = size + 'px';
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDuration = Math.random() * 6 + 5 + 's'; // 5-11s
        heart.style.animationDelay = Math.random() * 10 + 's';
        heart.style.opacity = Math.random() * 0.5 + 0.3;
        heartContainer.appendChild(heart);
        setTimeout(() => { if(heart && heart.remove) heart.remove(); }, 8000);
    }
    setInterval(createTinyHeart, 1800);
    // initial batch
    for(let i=0;i<12;i++) setTimeout(createTinyHeart, i*300);
</script>
